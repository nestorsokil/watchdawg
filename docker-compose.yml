services:
  watchdawg:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["-config", "/configs/config.integration.json"]
    volumes:
      - ./configs:/configs

  integration-tests:
    build:
      context: integration-tests
    ports:
      - 9090:9090
      - 8080:8080
    depends_on:
      watchdawg:
        condition: service_started
    profiles:
      - test
    volumes:
      - ./integration-tests:/tests
